<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Repo Box Chance Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container fade-in">

    <h1 class="title">Repo Box Chance Calculator</h1>

    <div class="input-area">
      <label>Level</label>
      <input type="number" id="levelInput" min="1" value="1">

      <label>Levels Since Last Box</label>
      <input type="number" id="streakInput" min="0" value="0">

      <button id="calcButton">Calculate</button>
    </div>

    <div id="results" class="results hidden fade-in">

      <h2>Roll Breakdown</h2>

      <div id="rollTableWrapper"></div>

      <h2>Totals</h2>

      <div class="stat"><span>Total Spawn Chance:</span><strong id="totalSpawn"></strong></div>
      <div class="stat"><span>Expected Boxes:</span><strong id="expectedBoxes"></strong></div>

      <div class="stat"><span>Chance of 0 Boxes:</span><strong id="chance0"></strong></div>
      <div class="stat"><span>Chance of 1 Box:</span><strong id="chance1"></strong></div>
      <div class="stat"><span>Chance of 2 Boxes:</span><strong id="chance2"></strong></div>
      <div class="stat"><span>Chance of 3 Boxes:</span><strong id="chance3"></strong></div>

      <h2>Total Rarity Chance</h2>

      <div class="stat"><span>Green:</span><strong id="totalGreen"></strong></div>
      <div class="stat"><span>Blue:</span><strong id="totalBlue"></strong></div>
      <div class="stat"><span>Purple:</span><strong id="totalPurple"></strong></div>
      <div class="stat"><span>Yellow:</span><strong id="totalYellow"></strong></div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
