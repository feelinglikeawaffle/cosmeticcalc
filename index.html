<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Repo Box Chance Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container fade-in">

    <h1 class="title">Repo Box Chance Calculator</h1>

    <div class="input-area">
      <label>Level</label>
      <input type="number" id="levelInput" min="1" value="1">

      <label>Levels Since Last Box</label>
      <input type="number" id="streakInput" min="0" value="0">

      <button id="calcButton">Calculate</button>
    </div>

    <div id="results" class="results hidden fade-in">

      <h2>Your Box Chance</h2>

      <div class="stat">
        <span>Effective Level:</span>
        <strong id="effectiveLevel"></strong>
      </div>

      <div class="stat">
        <span>Base Spawn Chance:</span>
        <strong id="baseChance"></strong>
      </div>

      <div class="stat">
        <span>Bad Luck Multiplier:</span>
        <strong id="multiplier"></strong>
      </div>

      <div class="stat highlight">
        <span>Final Spawn Chance:</span>
        <strong id="finalSpawn"></strong>
      </div>

      <div class="stat highlight">
        <span>Expected Boxes (per level):</span>
        <strong id="expectedBoxes"></strong>
      </div>

      <h3>Rarity Chances</h3>

      <div class="rarities">
        <div class="rarity green">
          <span>Green</span>
          <strong id="finalGreen"></strong>
        </div>

        <div class="rarity blue">
          <span>Blue</span>
          <strong id="finalBlue"></strong>
        </div>

        <div class="rarity purple">
          <span>Purple</span>
          <strong id="finalPurple"></strong>
        </div>

        <div class="rarity yellow">
          <span>Yellow</span>
          <strong id="finalYellow"></strong>
        </div>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
